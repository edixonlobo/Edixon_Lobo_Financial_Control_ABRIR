<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edixon Lobo Financial Control</title>
<style>
:root{--azul:#0B4EA2;--azul2:#073B7A;--luz:#F3F7FC;--texto:#132033;--gris:#6B7A90;--borde:#D7E3F3;--ok:#0E9F6E;--warn:#C27803;--bad:#C81E1E}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--luz);color:var(--texto)}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:white;padding:18px;display:flex;align-items:center;gap:12px;box-shadow:0 6px 18px #001b3d33}
.logo{width:52px;height:52px;border-radius:16px;background:white;color:var(--azul);display:grid;place-items:center;font-weight:900;font-size:20px}
h1{margin:0;font-size:22px}header p{margin:2px 0 0;opacity:.9}
main{max-width:1100px;margin:auto;padding:18px}
.hero,.panel,.card{background:white;border:1px solid var(--borde);border-radius:22px;box-shadow:0 8px 24px #073b7a14}
.hero{padding:22px}.hero h2{margin:0 0 6px}.hero p{margin:0;color:var(--gris)}
.resumen{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0}
.card{padding:16px}.card span{display:block;color:var(--gris);font-size:14px}.card strong{font-size:26px}
.tabs{display:flex;gap:10px;overflow:auto;padding-bottom:14px}
button{border:0;border-radius:14px;padding:12px 14px;font-weight:700;background:var(--azul);color:white}
.tabs button{background:white;color:var(--azul);border:1px solid var(--borde);white-space:nowrap}
.tabs button.active{background:var(--azul);color:white}
.panel{padding:18px}.badge{display:inline-block;border-radius:999px;background:#E6F0FF;color:var(--azul);padding:6px 10px;font-weight:700;font-size:13px}
.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
input,select{width:100%;border:1px solid var(--borde);border-radius:14px;padding:12px;font-size:16px}
.secondary{background:#E6F0FF;color:var(--azul)}
.tablewrap{overflow-x:auto}table{width:100%;border-collapse:collapse;margin-top:12px;background:white}
th,td{border-bottom:1px solid var(--borde);padding:10px;text-align:left;font-size:14px}th{background:#F7FAFF;color:var(--azul)}
.ok{color:var(--ok);font-weight:800}.pend{color:var(--warn);font-weight:800}.bad{color:var(--bad);font-weight:800}
.actions,footer{display:flex;gap:10px;flex-wrap:wrap}footer{max-width:1100px;margin:0 auto 30px;padding:0 18px}
footer button{background:white;color:var(--azul);border:1px solid var(--borde)}
#enableSound{position:fixed;right:18px;bottom:18px;background:var(--azul);color:white;border:none;padding:12px 16px;border-radius:14px;font-weight:800;z-index:9999;box-shadow:0 8px 24px #0003}
@media(max-width:760px){.resumen,.form{grid-template-columns:1fr}.actions button{width:100%}}
</style>
</head>
<body>

<header>
  <div class="logo">EL</div>
  <div><h1>Edixon Lobo</h1><p>Financial Control</p></div>
</header>

<main>
  <section class="hero">
    <h2>Control de pagos pendientes</h2>
    <p>Pagos, saldos, historial, cuadros por persona, alertas y recibo PDF profesional.</p>
  </section>

  <section class="resumen">
    <div class="card"><span>Total pendiente</span><strong id="totalPendiente">$0.00</strong></div>
    <div class="card"><span>Total pagado</span><strong id="totalPagado">$0.00</strong></div>
    <div class="card"><span>Alertas proximas</span><strong id="totalAlertas">0</strong></div>
  </section>

  <section class="tabs" id="tabs"></section>
  <section id="panel"></section>
</main>

<footer>
  <button onclick="exportBackup()">Exportar respaldo</button>
  <button onclick="resetAll()">Reiniciar todo</button>
</footer>

<button id="enableSound">ð Activar alertas</button>
<audio id="alertSound">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
const KEY="edixon_lobo_financial_control_v4";
let soundEnabled=false;
let lastAlertKey="";

function addDaysISO(date,days){let d=new Date(date);d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
function nextLarryDate(){return addDaysISO(new Date(),21)}

const defaultData={
 active:"Juan Rodriguez",
 people:[
  {name:"Juan Rodriguez",type:"Pago libre",initial:3499,balance:3499,paid:0,note:"Pagos libres. Permite pagos parciales y nuevos prestamos.",schedule:[],history:[]},
  {name:"Andriu Narvaez",type:"8 cuotas semanales",initial:2520,balance:2520,paid:0,note:"315 dolares todos los martes por 8 semanas desde el martes 2 de junio de 2026.",schedule:[
   ["1","2026-06-02",315],["2","2026-06-09",315],["3","2026-06-16",315],["4","2026-06-23",315],
   ["5","2026-06-30",315],["6","2026-07-07",315],["7","2026-07-14",315],["8","2026-07-21",315]
  ].map(x=>({week:x[0],date:x[1],amount:x[2],paid:false,paidDate:"",paidTime:"",reference:""})),history:[]},
  {name:"Larry Monsalve",type:"500 para pagar 600",initial:600,balance:600,paid:0,note:"Prestamo de 500 dolares para pagar 600 dolares cada 21 dias. Si paga intereses, se genera automaticamente el proximo vencimiento.",schedule:[
   {week:"1",date:"2026-06-04",amount:600,paid:false,paidDate:"",paidTime:"",reference:""}
  ],history:[]},
  {name:"Rhyse",type:"Pago unico directo",initial:815,balance:815,paid:0,note:"Pago unico de 815 dolares. Recordatorio interno cada 5 dias hasta cancelar.",schedule:[
   {week:"1",date:addDaysISO(new Date(),5),amount:815,paid:false,paidDate:"",paidTime:"",reference:""}
  ],history:[]}
 ]
};

let data=JSON.parse(localStorage.getItem(KEY)||JSON.stringify(defaultData));
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function money(n){return "$"+Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function now(){let d=new Date();return{date:d.toISOString().slice(0,10),time:d.toLocaleTimeString("es-US",{hour:"2-digit",minute:"2-digit"}),day:d.toLocaleDateString("es-US",{weekday:"long"})}}
function active(){return data.people.find(p=>p.name===data.active)}
function render(){renderSummary();renderTabs();renderPanel();checkAlerts(false)}

function renderSummary(){
 let pending=0,paid=0,alerts=0,today=new Date();
 data.people.forEach(p=>{pending+=Number(p.balance||0);paid+=Number(p.paid||0);p.schedule.forEach(s=>{if(!s.paid){let diff=Math.ceil((new Date(s.date)-today)/(1000*60*60*24));if(diff<=5)alerts++}})});
 document.getElementById("totalPendiente").textContent=money(pending);
 document.getElementById("totalPagado").textContent=money(paid);
 document.getElementById("totalAlertas").textContent=alerts;
}

function renderTabs(){
 let el=document.getElementById("tabs");el.innerHTML="";
 data.people.forEach(p=>{let b=document.createElement("button");b.textContent=p.name;b.className=p.name===data.active?"active":"";b.onclick=()=>{data.active=p.name;save();render()};el.appendChild(b)})
}

function renderPanel(){
 let p=active(),isJuan=p.name==="Juan Rodriguez",isLarry=p.name==="Larry Monsalve";
 let options='<option value="payment">Registrar pago</option>';
 if(isJuan) options+='<option value="loan">Agregar prestamo</option>';
 if(isLarry){
   options='<option value="interest">Pagar intereses / renovar 21 dias</option><option value="payment">Pago parcial</option><option value="full">Pago completo / cerrar deuda</option>';
 }
 document.getElementById("panel").innerHTML=`
 <div class="panel">
 <h2>${p.name}</h2>
 <span class="badge">${p.type}</span>
 <p>${p.note}</p>
 <div class="resumen">
  <div class="card"><span>Inicial</span><strong>${money(p.initial)}</strong></div>
  <div class="card"><span>Pagado</span><strong>${money(p.paid)}</strong></div>
  <div class="card"><span>Saldo</span><strong>${money(p.balance)}</strong></div>
 </div>
 <div class="form">
  <input id="amount" type="number" step="0.01" placeholder="Monto">
  <input id="reference" placeholder="Referencia o metodo">
  <select id="movement">${options}</select>
  <button onclick="addMovement()">Guardar y generar PDF</button>
 </div>
 <div class="actions">
  <button class="secondary" onclick="generatePDF(active(),null)">Generar PDF actual</button>
  <button class="secondary" onclick="resetPerson()">Reiniciar cuenta</button>
 </div>
 <h3>Cuadro de pagos</h3>${scheduleTable(p)}
 <h3>Historial</h3>${historyTable(p)}
 </div>`;
}

function scheduleTable(p){
 if(!p.schedule.length)return"<p>Cuenta finalizada o de pago libre. Usa el historial para ver todos los movimientos.</p>";
 return `<div class="tablewrap"><table><thead><tr><th>#</th><th>Fecha programada</th><th>Cuota</th><th>Estado</th><th>Fecha pago</th><th>Hora</th><th>Saldo estimado</th></tr></thead><tbody>${p.schedule.map(s=>{
 let status=s.paid?'<span class="ok">Pagado</span>':new Date(s.date)<new Date()?'<span class="bad">Vencido/Pendiente</span>':'<span class="pend">Pendiente</span>';
 return `<tr><td>${s.week}</td><td>${s.date}</td><td>${money(s.amount)}</td><td>${status}</td><td>${s.paidDate||"-"}</td><td>${s.paidTime||"-"}</td><td>${money(balanceAfter(p,s.week))}</td></tr>`
 }).join("")}</tbody></table></div>`
}

function balanceAfter(p,week){
 if(p.name==="Larry Monsalve") return p.balance;
 let bal=p.initial;p.schedule.forEach(s=>{if(Number(s.week)<=Number(week))bal-=s.amount});return Math.max(0,bal)
}

function historyTable(p){
 if(!p.history.length)return"<p>Sin movimientos registrados.</p>";
 return `<div class="tablewrap"><table><thead><tr><th>Fecha</th><th>Dia</th><th>Hora</th><th>Movimiento</th><th>Monto</th><th>Referencia</th><th>Saldo</th></tr></thead><tbody>${p.history.map(h=>`<tr><td>${h.date}</td><td>${h.day}</td><td>${h.time}</td><td>${h.type}</td><td>${money(h.amount)}</td><td>${h.reference||"-"}</td><td>${money(h.balance)}</td></tr>`).join("")}</tbody></table></div>`
}

function createNextLarryPayment(p){
 let unpaid=p.schedule.find(s=>!s.paid);
 if(unpaid){
   let t=now();
   unpaid.paid=true;
   unpaid.paidDate=t.date;
   unpaid.paidTime=t.time;
 }
 let nextNumber=p.schedule.length+1;
 p.schedule.push({week:String(nextNumber),date:nextLarryDate(),amount:600,paid:false,paidDate:"",paidTime:"",reference:""});
 p.balance=600;
 p.initial=600;
}

function addMovement(){
 let p=active(),amount=Number(document.getElementById("amount").value),ref=document.getElementById("reference").value.trim(),mov=document.getElementById("movement").value;
 if(!amount||amount<=0){alert("Coloca un monto valido.");return}
 let t=now();

 if(mov==="loan"){
  p.initial+=amount;p.balance+=amount;
  p.history.unshift({date:t.date,day:t.day,time:t.time,type:"Nuevo prestamo",amount,reference:ref,balance:p.balance});
  save();render();generatePDF(p,p.history[0]);return;
 }

 if(p.name==="Larry Monsalve" && mov==="interest"){
  createNextLarryPayment(p);
  p.paid+=amount;
  p.history.unshift({date:t.date,day:t.day,time:t.time,type:"Pago de intereses / renovacion 21 dias",amount,reference:ref,balance:p.balance});
  save();render();generatePDF(p,p.history[0]);playAlert();alert("Proximo pago de Larry generado para dentro de 21 dias.");return;
 }

 if(p.name==="Larry Monsalve" && mov==="full"){
  p.balance=0;p.paid+=amount;
  let unpaid=p.schedule.find(s=>!s.paid);
  if(unpaid){unpaid.paid=true;unpaid.paidDate=t.date;unpaid.paidTime=t.time;unpaid.reference=ref}
  p.history.unshift({date:t.date,day:t.day,time:t.time,type:"Pago completo / deuda cerrada",amount,reference:ref,balance:p.balance});
  save();render();generatePDF(p,p.history[0]);alert("Deuda cerrada. PDF generado con agradecimiento por la confianza.");return;
 }

 p.balance=Math.max(0,p.balance-amount);p.paid+=amount;
 let next=p.schedule.find(s=>!s.paid);
 if(next&&amount>=Number(next.amount)){next.paid=true;next.paidDate=t.date;next.paidTime=t.time;next.reference=ref}
 if(p.name==="Rhyse"&&p.balance>0){p.schedule=[{week:"Proximo",date:addDaysISO(new Date(),5),amount:p.balance,paid:false,paidDate:"",paidTime:"",reference:""}]}
 if(p.balance===0){
   p.schedule.forEach(s=>{if(!s.paid){s.paid=true;s.paidDate=t.date;s.paidTime=t.time;s.reference=ref}})
 }
 p.history.unshift({date:t.date,day:t.day,time:t.time,type:p.balance===0?"Pago completo / deuda cerrada":"Pago recibido",amount,reference:ref,balance:p.balance});
 save();render();generatePDF(p,p.history[0]);
}

function resetPerson(){
 if(!confirm("Reiniciar esta cuenta?"))return;
 let i=data.people.findIndex(x=>x.name===data.active);
 data.people[i]=JSON.parse(JSON.stringify(defaultData.people.find(x=>x.name===data.active)));
 save();render();
}

function resetAll(){
 if(!confirm("Borrar todo y volver al inicio?"))return;
 localStorage.removeItem(KEY);data=JSON.parse(JSON.stringify(defaultData));save();render();
}

function exportBackup(){
 let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="respaldo_edixon_lobo.json";a.click();
}

function playAlert(){
 if(soundEnabled){
  let audio=document.getElementById("alertSound");
  audio.currentTime=0;
  audio.play().catch(()=>{});
 }
}

function checkAlerts(showPopup){
 let today=new Date(),messages=[];
 data.people.forEach(p=>{
  p.schedule.forEach(s=>{
   if(!s.paid){
    let diff=Math.ceil((new Date(s.date)-today)/(1000*60*60*24));
    if(diff<=5){
     messages.push(p.name+" - vence en "+diff+" dia(s). Fecha: "+s.date+" - Monto: "+money(s.amount));
    }
   }
  })
 });
 if(messages.length){
  let key=new Date().toISOString().slice(0,10)+"-"+messages.join("|");
  if(showPopup || key!==lastAlertKey){
   lastAlertKey=key;
   playAlert();
   if(showPopup) alert("Recordatorios de pago:\n\n"+messages.join("\n"));
  }
 }
}

document.getElementById("enableSound").addEventListener("click",()=>{
 soundEnabled=true;
 playAlert();
 checkAlerts(true);
 alert("Alertas sonoras activadas. MantÃ©n esta pagina abierta para recibir avisos.");
});

setInterval(()=>checkAlerts(false),60000);

function generatePDF(p,movement){
 if(!window.jspdf){alert("No cargo el generador PDF. Conectate a internet y recarga.");return}
 const {jsPDF}=window.jspdf;let doc=new jsPDF({unit:"pt",format:"letter"}),m=42,y=120;
 let closed=p.balance===0;
 doc.setFillColor(11,78,162);doc.rect(0,0,612,92,"F");
 doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(22);doc.text("Edixon Lobo",m,38);
 doc.setFontSize(12);doc.setFont("helvetica","normal");doc.text("Financial Control - Recibo / Estado de cuenta",m,60);
 doc.setTextColor(19,32,51);doc.setFontSize(16);doc.setFont("helvetica","bold");doc.text("Cuenta: "+p.name,m,y);
 y+=24;doc.setFontSize(11);doc.setFont("helvetica","normal");doc.text("Tipo: "+p.type,m,y);y+=18;
 doc.text("Fecha de emision: "+new Date().toLocaleString("es-US"),m,y);y+=24;
 doc.setFillColor(closed?230:243,closed?255:247,closed?240:252);doc.roundedRect(m,y,528,72,10,10,"F");
 doc.setTextColor(11,78,162);doc.setFont("helvetica","bold");doc.text(closed?"Estado: DEUDA CERRADA":"Resumen",m+16,y+22);
 doc.setTextColor(19,32,51);doc.setFont("helvetica","normal");
 doc.text("Monto inicial: "+money(p.initial),m+16,y+44);
 doc.text("Total pagado: "+money(p.paid),m+190,y+44);
 doc.text("Saldo pendiente: "+money(p.balance),m+360,y+44);
 y+=100;
 if(movement){
  doc.setFont("helvetica","bold");doc.setTextColor(11,78,162);doc.text("Ultimo movimiento registrado",m,y);y+=18;
  doc.setTextColor(19,32,51);doc.setFont("helvetica","normal");
  doc.text(`${movement.type}: ${money(movement.amount)} - ${movement.date} - ${movement.time} - Saldo: ${money(movement.balance)}`,m,y);y+=26;
 }
 doc.setFont("helvetica","bold");doc.setTextColor(11,78,162);doc.text("Cuadro actualizado",m,y);y+=16;
 doc.setFontSize(9);doc.setTextColor(19,32,51);
 if(p.schedule.length){
  doc.text("#",m,y);doc.text("Fecha programada",m+50,y);doc.text("Cuota",m+180,y);doc.text("Estado",m+260,y);doc.text("Fecha pago",m+350,y);doc.text("Saldo",m+460,y);
  y+=10;doc.line(m,y,570,y);y+=15;
  p.schedule.forEach(s=>{if(y>690){doc.addPage();y=50}
   doc.text(String(s.week),m,y);doc.text(s.date,m+50,y);doc.text(money(s.amount),m+180,y);doc.text(s.paid?"Pagado":"Pendiente",m+260,y);doc.text(s.paidDate||"-",m+350,y);doc.text(p.name==="Larry Monsalve"?money(p.balance):money(balanceAfter(p,s.week)),m+460,y);y+=16;
  });
 }else{doc.text("Cuenta de pago libre. Ver historial de movimientos.",m,y);y+=20}
 y+=18;if(y>650){doc.addPage();y=50}
 doc.setFont("helvetica","bold");doc.setTextColor(11,78,162);doc.setFontSize(11);doc.text("Historial de movimientos",m,y);y+=16;
 doc.setFont("helvetica","normal");doc.setTextColor(19,32,51);doc.setFontSize(8.5);
 doc.text("Fecha",m,y);doc.text("Hora",m+72,y);doc.text("Movimiento",m+130,y);doc.text("Monto",m+260,y);doc.text("Referencia",m+340,y);doc.text("Saldo",m+465,y);
 y+=10;doc.line(m,y,570,y);y+=14;
 p.history.slice(0,25).forEach(h=>{if(y>720){doc.addPage();y=50}
  doc.text(h.date,m,y);doc.text(h.time,m+72,y);doc.text(h.type,m+130,y);doc.text(money(h.amount),m+260,y);doc.text(String(h.reference||"-").slice(0,18),m+340,y);doc.text(money(h.balance),m+465,y);y+=15;
 });
 y=Math.min(y+28,690);
 doc.setFillColor(closed?220:230,closed?255:240,closed?230:255);doc.roundedRect(m,y,528,70,10,10,"F");
 doc.setTextColor(19,32,51);doc.setFontSize(10);doc.setFont("helvetica","normal");
 let msg=closed?
 "Gracias por la confianza. Confirmamos que esta cuenta ha sido pagada en su totalidad y queda cerrada con saldo pendiente en cero. Agradecemos su cumplimiento y la relacion financiera transparente mantenida.":
 "Gracias por su confianza. Este documento refleja el estado actualizado de la cuenta al momento de su emision, manteniendo una relacion financiera clara, organizada y transparente.";
 doc.text(doc.splitTextToSize(msg,500),m+16,y+22);
 doc.setFont("helvetica","bold");doc.text("Atentamente, Edixon Lobo Financial Control",m+16,y+60);
 doc.save(p.name.replaceAll(" ","_")+"_recibo_Edixon_Lobo.pdf");
}

render();
</script>
</body>
</html>
