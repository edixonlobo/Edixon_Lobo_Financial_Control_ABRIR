<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edixon Lobo Financial Control</title>
<style>
:root{--blue:#0B4EA2;--blue2:#073B7A;--light:#F3F7FC;--text:#132033;--muted:#6B7A90;--ok:#0E9F6E;--warn:#C27803;--danger:#C81E1E;--border:#D7E3F3}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--light);color:var(--text)}
header{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;padding:18px;display:flex;align-items:center;gap:12px;box-shadow:0 6px 18px #001b3d33}
.logo{width:52px;height:52px;border-radius:16px;background:white;color:var(--blue);display:grid;place-items:center;font-weight:900;font-size:20px}
h1{margin:0;font-size:22px} header p{margin:2px 0 0;opacity:.9}
main{max-width:1100px;margin:auto;padding:18px}
.hero,.panel,.card{background:white;border:1px solid var(--border);border-radius:22px;box-shadow:0 8px 24px #073b7a14}
.hero{padding:22px}.hero h2{margin:0 0 6px}.hero p{margin:0;color:var(--muted)}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0}
.card{padding:16px}.card span{display:block;color:var(--muted);font-size:14px}.card strong{font-size:26px}
.tabs{display:flex;gap:10px;overflow:auto;padding-bottom:14px}
button{border:0;border-radius:14px;padding:12px 14px;font-weight:700;background:var(--blue);color:white}
.tabs button{background:white;color:var(--blue);border:1px solid var(--border);white-space:nowrap}
.tabs button.active{background:var(--blue);color:white}
.panel{padding:18px}.badge{display:inline-block;border-radius:999px;background:#E6F0FF;color:var(--blue);padding:6px 10px;font-weight:700;font-size:13px}
.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
input,select{width:100%;border:1px solid var(--border);border-radius:14px;padding:12px;font-size:16px}
.secondary{background:#E6F0FF;color:var(--blue)}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;margin-top:12px;background:white}
th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left;font-size:14px}th{background:#F7FAFF;color:var(--blue)}
.ok{color:var(--ok);font-weight:800}.pending{color:var(--warn);font-weight:800}.due{color:var(--danger);font-weight:800}
.actions,footer{display:flex;gap:10px;flex-wrap:wrap}footer{max-width:1100px;margin:0 auto 30px;padding:0 18px}
footer button{background:white;color:var(--blue);border:1px solid var(--border)}
@media(max-width:760px){.summary,.form{grid-template-columns:1fr}.actions button{width:100%}}
</style>
</head>
<body>
<header>
  <div class="logo">EL</div>
  <div><h1>Edixon Lobo</h1><p>Financial Control</p></div>
</header>

<main>
  <section class="hero">
    <h2>Control de pagos pendientes</h2>
    <p>Pagos, saldos, historial, cuadros por persona y recibo listo para enviar.</p>
  </section>

  <section class="summary">
    <div class="card"><span>Total pendiente</span><strong id="totalPending">$0.00</strong></div>
    <div class="card"><span>Total pagado</span><strong id="totalPaid">$0.00</strong></div>
    <div class="card"><span>Alertas prÃ³ximas</span><strong id="alertsCount">0</strong></div>
  </section>

  <section class="tabs" id="tabs"></section>
  <section id="panel"></section>
</main>

<footer>
  <button onclick="exportBackup()">Exportar respaldo</button>
  <button onclick="resetAll()">Reiniciar todo</button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
const KEY="edixon_lobo_financial_control_v2";
function addDaysISO(date,days){let d=new Date(date);d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
const defaultData={
 active:"Juan RodrÃ­guez",
 people:[
  {name:"Juan RodrÃ­guez",type:"Pago libre",initial:3499,balance:3499,paid:0,note:"Pagos libres. Permite pagos parciales y nuevos prÃ©stamos.",schedule:[],history:[]},
  {name:"Andriu NarvÃ¡ez",type:"8 cuotas semanales",initial:2520,balance:2520,paid:0,note:"$315 todos los martes por 8 semanas desde el martes 2 de junio de 2026.",schedule:[
   ["1","2026-06-02",315],["2","2026-06-09",315],["3","2026-06-16",315],["4","2026-06-23",315],
   ["5","2026-06-30",315],["6","2026-07-07",315],["7","2026-07-14",315],["8","2026-07-21",315]
  ].map(x=>({week:x[0],date:x[1],amount:x[2],paid:false,paidDate:"",paidTime:"",reference:""})),history:[]},
  {name:"Larry Monsalve",type:"$500 para pagar $600",initial:600,balance:600,paid:0,note:"Pago de $600 cada 21 dÃ­as. Inicio del prÃ©stamo: 14 de mayo de 2026. Primer vencimiento: 4 de junio de 2026.",schedule:[
   {week:"1",date:"2026-06-04",amount:600,paid:false,paidDate:"",paidTime:"",reference:""}
  ],history:[]},
  {name:"Rhyse",type:"Pago Ãºnico directo",initial:815,balance:815,paid:0,note:"Pago Ãºnico de $815. Recordatorio interno cada 5 dÃ­as hasta cancelar.",schedule:[
   {week:"1",date:addDaysISO(new Date(),5),amount:815,paid:false,paidDate:"",paidTime:"",reference:""}
  ],history:[]}
 ]
};
let data=JSON.parse(localStorage.getItem(KEY)||JSON.stringify(defaultData));
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function money(n){return "$"+Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function now(){let d=new Date();return{date:d.toISOString().slice(0,10),time:d.toLocaleTimeString("es-US",{hour:"2-digit",minute:"2-digit"}),day:d.toLocaleDateString("es-US",{weekday:"long"})}}
function active(){return data.people.find(p=>p.name===data.active)}
function render(){summary();tabs();panel()}
function summary(){let pending=0,paid=0,alerts=0,today=new Date();data.people.forEach(p=>{pending+=p.balance;paid+=p.paid;p.schedule.forEach(s=>{if(!s.paid&&((new Date(s.date)-today)/(1000*60*60*24)<=5))alerts++})});totalPending.textContent=money(pending);totalPaid.textContent=money(paid);alertsCount.textContent=alerts}
function tabs(){let el=document.getElementById("tabs");el.innerHTML="";data.people.forEach(p=>{let b=document.createElement("button");b.textContent=p.name;b.className=p.name===data.active?"active":"";b.onclick=()=>{data.active=p.name;save();render()};el.appendChild(b)})}
function panel(){let p=active(), isJuan=p.name==="Juan RodrÃ­guez";document.getElementById("panel").innerHTML=`
<div class="panel">
<h2>${p.name}</h2>
<span class="badge">${p.type}</span>
<p>${p.note}</p>
<div class="summary">
 <div class="card"><span>Inicial</span><strong>${money(p.initial)}</strong></div>
 <div class="card"><span>Pagado</span><strong>${money(p.paid)}</strong></div>
 <div class="card"><span>Saldo</span><strong>${money(p.balance)}</strong></div>
</div>
<div class="form">
 <input id="amount" type="number" step="0.01" placeholder="Monto">
 <input id="reference" placeholder="Referencia / mÃ©todo">
 <select id="movement"><option value="payment">Registrar pago</option>${isJuan?'<option value="loan">Agregar prÃ©stamo</option>':''}</select>
 <button onclick="addMovement()">Guardar y generar PDF</button>
</div>
<div class="actions">
 <button class="secondary" onclick="generatePDF(active(),null)">Generar PDF actual</button>
 <button class="secondary" onclick="resetPerson()">Reiniciar cuenta</button>
</div>
<h3>Cuadro de pagos</h3>${scheduleTable(p)}
<h3>Historial</h3>${historyTable(p)}
</div>`}
function scheduleTable(p){if(!p.schedule.length)return"<p>Cuenta de pago libre. Usa el historial para ver todos los movimientos.</p>";return`<div class="table-wrap"><table><thead><tr><th>#</th><th>Fecha programada</th><th>Cuota</th><th>Estado</th><th>Fecha pago</th><th>Hora</th><th>Saldo estimado</th></tr></thead><tbody>${p.schedule.map(s=>`<tr><td>${s.week}</td><td>${s.date}</td><td>${money(s.amount)}</td><td>${s.paid?'<span class="ok">Pagado</span>':new Date(s.date)<new Date()?'<span class="due">Vencido/Pendiente</span>':'<span class="pending">Pendiente</span>'}</td><td>${s.paidDate||"-"}</td><td>${s.paidTime||"-"}</td><td>${money(balanceAfter(p,s.week))}</td></tr>`).join("")}</tbody></table></div>`}
function balanceAfter(p,week){let bal=p.initial;p.schedule.forEach(s=>{if(Number(s.week)<=Number(week))bal-=s.amount});return Math.max(0,bal)}
function historyTable(p){if(!p.history.length)return"<p>Sin movimientos registrados.</p>";return`<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>DÃ­a</th><th>Hora</th><th>Movimiento</th><th>Monto</th><th>Referencia</th><th>Saldo</th></tr></thead><tbody>${p.history.map(h=>`<tr><td>${h.date}</td><td>${h.day}</td><td>${h.time}</td><td>${h.type}</td><td>${money(h.amount)}</td><td>${h.reference||"-"}</td><td>${money(h.balance)}</td></tr>`).join("")}</tbody></table></div>`}
function addMovement(){let p=active(), amount=Number(document.getElementById("amount").value), ref=document.getElementById("reference").value.trim(), mov=document.getElementById("movement").value;if(!amount||amount<=0){alert("Coloca un monto vÃ¡lido");return}let t=now();if(mov==="loan"){p.initial+=amount;p.balance+=amount;p.history.unshift({date:t.date,day:t.day,time:t.time,type:"Nuevo prÃ©stamo",amount,reference:ref,balance:p.balance});save();render();generatePDF(p,p.history[0]);return}p.balance=Math.max(0,p.balance-amount);p.paid+=amount;let next=p.schedule.find(s=>!s.paid);if(next&&amount>=next.amount){next.paid=true;next.paidDate=t.date;next.paidTime=t.time;next.reference=ref}if(p.name==="Rhyse"&&p.balance>0){p.schedule=[{week:"PrÃ³ximo",date:addDaysISO(new Date(),5),amount:p.balance,paid:false,paidDate:"",paidTime:"",reference:""}]}p.history.unshift({date:t.date,day:t.day,time:t.time,type:"Pago recibido",amount,reference:ref,balance:p.balance});save();render();generatePDF(p,p.history[0])}
function resetPerson(){if(!confirm("Â¿Reiniciar esta cuenta?"))return;let i=data.people.findIndex(x=>x.name===data.active);data.people[i]=JSON.parse(JSON.stringify(defaultData.people.find(x=>x.name===data.active)));save();render()}
function resetAll(){if(!confirm("Â¿Borrar todo y volver al inicio?"))return;localStorage.removeItem(KEY);data=JSON.parse(JSON.stringify(defaultData));save();render()}
function exportBackup(){let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="respaldo_edixon_lobo.json";a.click()}
function generatePDF(p,movement){
 if(!window.jspdf){alert("No cargÃ³ el generador PDF. ConÃ©ctate a internet y recarga.");return}
 const {jsPDF}=window.jspdf;let doc=new jsPDF({unit:"pt",format:"letter"}),m=42,y=120;
 doc.setFillColor(11,78,162);doc.rect(0,0,612,92,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(22);doc.text("Edixon Lobo",m,38);doc.setFontSize(12);doc.setFont("helvetica","normal");doc.text("Financial Control Â· Recibo / Estado de cuenta",m,60);
 doc.setTextColor(19,32,51);doc.setFontSize(16);doc.setFont("helvetica","bold");doc.text("Cuenta: "+p.name,m,y);y+=24;doc.setFontSize(11);doc.setFont("helvetica","normal");doc.text("Tipo: "+p.type,m,y);y+=18;doc.text("Fecha de emisiÃ³n: "+new Date().toLocaleString("es-US"),m,y);y+=24;
 doc.setFillColor(243,247,252);doc.roundedRect(m,y,528,72,10,10,"F");doc.setTextColor(11,78,162);doc.setFont("helvetica","bold");doc.text("Resumen",m+16,y+22);doc.setTextColor(19,32,51);doc.setFont("helvetica","normal");doc.text("Monto inicial: "+money(p.initial),m+16,y+44);doc.text("Total pagado: "+money(p.paid),m+190,y+44);doc.text("Saldo pendiente: "+money(p.balance),m+360,y+44);y+=100;
 if(movement){doc.setFont("helvetica","bold");doc.setTextColor(11,78,162);doc.text("Ãltimo movimiento registrado",m,y);y+=18;doc.setTextColor(19,32,51);doc.setFont("helvetica","normal");doc.text(`${movement.type}: ${money(movement.amount)} Â· ${movement.date} Â· ${movement.time} Â· Saldo: ${money(movement.balance)}`,m,y);y+=26}
 doc.setFont("helvetica","bold");doc.setTextColor(11,78,162);doc.text("Cuadro actualizado",m,y);y+=16;doc.setFontSize(9);doc.setTextColor(19,32,51);
 if(p.schedule.length){doc.text("#",m,y);doc.text("Fecha programada",m+50,y);doc.text("Cuota",m+180,y);doc.text("Estado",m+260,y);doc.text("Fecha pago",m+350,y);doc.text("Saldo",m+460,y);y+=10;doc.line(m,y,570,y);y+=15;p.schedule.forEach(s=>{if(y>690){doc.addPage();y=50}doc.text(String(s.week),m,y);doc.text(s.date,m+50,y);doc.text(money(s.amount),m+180,y);doc.text(s.paid?"Pagado":"Pendiente",m+260,y);doc.text(s.paidDate||"-",m+350,y);doc.text(money(balanceAfter(p,s.week)),m+460,y);y+=16})}else{doc.text("Cuenta de pago libre. Ver historial de movimientos.",m,y);y+=20}
 y+=18;if(y>650){doc.addPage();y=50}doc.setFont("helvetica","bold");doc.setTextColor(11,78,162);doc.setFontSize(11);doc.text("Historial de movimientos",m,y);y+=16;doc.setFont("helvetica","normal");doc.setTextColor(19,32,51);doc.setFontSize(8.5);doc.text("Fecha",m,y);doc.text("Hora",m+72,y);doc.text("Movimiento",m+130,y);doc.text("Monto",m+260,y);doc.text("Referencia",m+340,y);doc.text("Saldo",m+465,y);y+=10;doc.line(m,y,570,y);y+=14;
 p.history.slice(0,22).forEach(h=>{if(y>720){doc.addPage();y=50}doc.text(h.date,m,y);doc.text(h.time,m+72,y);doc.text(h.type,m+130,y);doc.text(money(h.amount),m+260,y);doc.text(String(h.reference||"-").slice(0,18),m+340,y);doc.text(money(h.balance),m+465,y);y+=15});
 y=Math.min(y+28,690);doc.setFillColor(230,240,255);doc.roundedRect(m,y,528,58,10,10,"F");doc.setTextColor(19,32,51);doc.setFontSize(10);doc.setFont("helvetica","normal");let msg="Gracias por su confianza. Este documento refleja el estado actualizado de la cuenta al momento de su emisiÃ³n, manteniendo una relaciÃ³n financiera clara, organizada y transparente.";doc.text(doc.splitTextToSize(msg,500),m+16,y+22);doc.setFont("helvetica","bold");doc.text("Atentamente, Edixon Lobo Financial Control",m+16,y+48);
 doc.save(p.name.replaceAll(" ","_")+"_recibo_Edixon_Lobo.pdf")
}
render();
</script>
</body>
</html>
